spring.application.name=chat-consumer
server.port=8082

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Part 4 tuning: consumer concurrency (e.g. 10, 20, 40, 80)
# Format: concurrentConsumers maxConcurrentConsumers (default 1-20)
spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=20
spring.rabbitmq.listener.simple.prefetch=50

chat.queue.prefix=room.
