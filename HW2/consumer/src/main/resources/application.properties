spring.application.name=chat-consumer
server.port=8082

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Part 4 tuning: consumer concurrency (e.g. 10, 20, 40, 80)
# Format: concurrentConsumers maxConcurrentConsumers (default 1-20)
spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=20
spring.rabbitmq.listener.simple.prefetch=50
# Manual ack: listener must basicAck / basicNack (see RoomMessageListener)
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Faster reconnection attempts when broker is down
spring.rabbitmq.listener.simple.recovery-interval=5000

# Circuit breaker for message processing (broadcast path)
resilience4j.circuitbreaker.instances.roomMessages.sliding-window-size=20
resilience4j.circuitbreaker.instances.roomMessages.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.roomMessages.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.roomMessages.permitted-number-of-calls-in-half-open-state=5

chat.queue.prefix=room.
