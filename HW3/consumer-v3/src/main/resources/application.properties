spring.application.name=chat-consumer-v3
server.port=8082

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=20
spring.rabbitmq.listener.simple.prefetch=50
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.recovery-interval=5000

spring.datasource.url=jdbc:postgresql://localhost:5432/cs6650_chat
spring.datasource.username=maisuiyang
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3

chat.exchange.name=chat.exchange
chat.queue.prefix=room.
# Batch write tuning: quick runs (100k MAIN) showed best throughput at batch 5000, flush 1000 ms.
chat.persistence.batch-size=5000
chat.persistence.flush-interval-ms=1000
# Raise for high burst (e.g. 1M client run); if full, broadcast still works but DB may skip rows until WARN stops.
chat.persistence.queue-capacity=2000000
chat.persistence.max-retries=4
chat.persistence.dlq-queue=db.write.dlq
chat.stats.period-ms=60000

resilience4j.circuitbreaker.instances.roomMessages.sliding-window-size=20
resilience4j.circuitbreaker.instances.roomMessages.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.roomMessages.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.roomMessages.permitted-number-of-calls-in-half-open-state=5

resilience4j.circuitbreaker.instances.databaseWrites.sliding-window-size=10
resilience4j.circuitbreaker.instances.databaseWrites.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.databaseWrites.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.databaseWrites.minimum-number-of-calls=5
